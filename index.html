<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#f8f8fa" />
<title>QuickMart — Finance Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8f8fa; color: #1f2937; font-family: 'Sora', sans-serif; }
  select, input, button { font-family: 'Sora', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #ffffff; }
  ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  .hamburger { display: none !important; }
  .sidebar-overlay { display: none; }

  @media (max-width: 768px) {
    .hamburger { display: flex !important; }
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 14; }
    .sidebar-overlay.open { display: block; }
    .main-content { margin-left: 0 !important; padding: 16px 12px !important; padding-top: 58px !important; }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .syncing-dot { animation: pulse 1.2s infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

// ─── CONSTANTS ──────────────────────────────────────────────────
const fmt = (n) => new Intl.NumberFormat("en-IN", { style:"currency", currency:"INR", maximumFractionDigits:0 }).format(n||0);
const today = () => new Date().toISOString().slice(0,10);

const PEOPLE = ["Vikram", "Meena"];
const INCOME_CATS  = ["Counter Sales", "Wholesale", "Online Orders", "Home Delivery", "Festival Sales", "Misc Income"];
const EXPENSE_CATS = ["Stock Purchase", "Rent", "Electricity", "Water", "Staff Salaries", "Transport", "Packaging", "Shop Maintenance", "Insurance", "Marketing", "Misc Expense"];
const ALL_CATS = [...INCOME_CATS, ...EXPENSE_CATS];

const PLATFORM_CATS = [];

const PRIMARY = "#0369a1";
const SIDEBAR_BG = "#0c4a6e";
const SIDEBAR_BORDER = "#075985";
const ACCENT_LIGHT = "#7dd3fc";

// ─── STORAGE HELPERS ────────────────────────────────────────────
const HARDCODED_URL = "";
const CACHE_KEY = "qm_entries_v1";

const getCache = () => { try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || []; } catch { return []; } };
const setCache = (v) => { try { localStorage.setItem(CACHE_KEY, JSON.stringify(v)); } catch {} };

// ─── GOOGLE SHEETS API ─────────────────────────────────────────
async function fetchAllData(url) {
  if (!url) return { Entries: [] };
  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed to fetch data");
  return res.json();
}

function syncSheet(url, rows) {
  if (!url) return;
  fetch(url, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "sync", sheet: "Entries", rows })
  }).catch(err => console.error("Sync error:", err));
}

// ─── DATE RANGE HELPERS ─────────────────────────────────────────
function getDateRange(filter, customFrom, customTo) {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  switch(filter) {
    case "today": return [todayStr, todayStr];
    case "week": {
      const d = new Date(now);
      d.setDate(d.getDate() - d.getDay());
      return [d.toISOString().slice(0,10), todayStr];
    }
    case "month": {
      const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,"0");
      return [`${y}-${m}-01`, todayStr];
    }
    case "custom": return [customFrom || "2000-01-01", customTo || todayStr];
    default: return [null, null];
  }
}

function filterByDate(entries, filter, customFrom, customTo) {
  if (filter === "all") return entries;
  const [from, to] = getDateRange(filter, customFrom, customTo);
  if (!from) return entries;
  return entries.filter(e => e.date >= from && e.date <= to);
}

// ─── NET AMOUNT CALCULATOR ─────────────────────────────────────
function calcNet(entry) {
  const amt = +entry.amount || 0;
  return amt;
}

// ─── PIN AUTH ───────────────────────────────────────────────────
const PIN_KEY = "qm_pin_hash";
const HARDCODED_PIN_HASH = "12bea80643a8386f3565844540d1d55151e553ff1acc924587340bc9fdfada45";
const SESSION_KEY = "qm_session";

async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin + "retail_shop_salt");
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function PinScreen({ mode, onSuccess }) {
  const [pin, setPin] = useState(["","","","","",""]);
  const [confirm, setConfirm] = useState(["","","","","",""]);
  const [step, setStep] = useState("enter");
  const [error, setError] = useState("");
  const refs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];
  const confirmRefs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const handleInput = (arr, setArr, refArr, idx, val) => {
    if (!/^\d?$/.test(val)) return;
    const next = [...arr];
    next[idx] = val;
    setArr(next);
    setError("");
    if (val && idx < 5) refArr[idx+1].current?.focus();
  };

  const handleKey = (arr, setArr, refArr, idx, e) => {
    if (e.key === "Backspace" && !arr[idx] && idx > 0) {
      refArr[idx-1].current?.focus();
    }
  };

  const pinFull = pin.every(d => d !== "");
  const confirmFull = confirm.every(d => d !== "");

  const submit = async () => {
    const code = pin.join("");
    if (mode === "setup") {
      if (step === "enter") {
        setStep("confirm");
        setConfirm(["","","","","",""]);
        setTimeout(() => confirmRefs[0].current?.focus(), 100);
        return;
      }
      const confirmCode = confirm.join("");
      if (code !== confirmCode) {
        setError("PINs don't match. Try again.");
        setConfirm(["","","","","",""]);
        confirmRefs[0].current?.focus();
        return;
      }
      const h = await hashPin(code);
      localStorage.setItem(PIN_KEY, h);
      sessionStorage.setItem(SESSION_KEY, "1");
      onSuccess();
    } else {
      const h = await hashPin(code);
      const stored = HARDCODED_PIN_HASH || localStorage.getItem(PIN_KEY);
      if (h === stored) {
        sessionStorage.setItem(SESSION_KEY, "1");
        onSuccess();
      } else {
        setError("Wrong PIN. Try again.");
        setPin(["","","","","",""]);
        refs[0].current?.focus();
      }
    }
  };

  useEffect(() => { refs[0].current?.focus(); }, []);
  useEffect(() => {
    if (mode === "login" && pinFull) submit();
    if (mode === "setup" && step === "confirm" && confirmFull) submit();
  }, [pin, confirm]);

  const dotStyle = (filled) => ({
    width: 44, height: 52, textAlign: "center", fontSize: 22, fontWeight: 700,
    background: "#ffffff", border: `2px solid ${filled ? PRIMARY : "#e5e7eb"}`,
    borderRadius: 12, color: "#111827", fontFamily: "'JetBrains Mono',monospace",
    outline: "none", caretColor: PRIMARY, transition: "border 0.2s",
    WebkitTextSecurity: "disc"
  });

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ maxWidth:380, width:"100%", textAlign:"center" }} className="fade-in">
        <div style={{ fontSize:11, letterSpacing:3, color:PRIMARY, fontWeight:600, textTransform:"uppercase", marginBottom:6 }}>QuickMart</div>
        <h1 style={{ fontSize:26, fontWeight:700, color:"#111827", margin:"0 0 10px", letterSpacing:"-0.02em" }}>Finance Hub</h1>
        <p style={{ fontSize:14, color:"#6b7280", marginBottom:32, lineHeight:1.5 }}>
          {mode==="setup" ? (step==="enter" ? "Create a 6-digit PIN" : "Confirm your PIN") : "Enter your PIN to continue"}
        </p>

        <div style={{ display:"flex", gap:8, justifyContent:"center", marginBottom:20 }}>
          {(step==="confirm" && mode==="setup" ? confirm : pin).map((d, i) => (
            <input
              key={`${step}-${i}`}
              ref={step==="confirm" && mode==="setup" ? confirmRefs[i] : refs[i]}
              type="tel"
              inputMode="numeric"
              maxLength={1}
              value={step==="confirm" && mode==="setup" ? confirm[i] : pin[i]}
              onChange={e => step==="confirm" && mode==="setup"
                ? handleInput(confirm, setConfirm, confirmRefs, i, e.target.value)
                : handleInput(pin, setPin, refs, i, e.target.value)
              }
              onKeyDown={e => step==="confirm" && mode==="setup"
                ? handleKey(confirm, setConfirm, confirmRefs, i, e)
                : handleKey(pin, setPin, refs, i, e)
              }
              style={dotStyle(d !== "" || (step==="confirm" && mode==="setup" && confirm[i] !== ""))}
            />
          ))}
        </div>

        {error && <div style={{ color:"#f87171", fontSize:13, marginBottom:16 }}>{error}</div>}

        {mode==="setup" && step==="enter" && pinFull && (
          <button onClick={submit} style={{ padding:"12px 32px", background:PRIMARY, border:"none", borderRadius:10, color:"#fff", fontSize:14, fontWeight:600, cursor:"pointer" }}>
            Next
          </button>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(SESSION_KEY) === "1");
  const hasPin = !!(HARDCODED_PIN_HASH || localStorage.getItem(PIN_KEY));

  if (!authed) {
    return <PinScreen mode={hasPin ? "login" : "setup"} onSuccess={() => setAuthed(true)} />;
  }

  return <AppMain onLogout={() => { sessionStorage.removeItem(SESSION_KEY); setAuthed(false); }} />;
}

function AppMain({ onLogout }) {
  const [entries, setEntriesRaw] = useState(() => getCache());
  const [view, setView] = useState("dashboard");
  const [loading, setLoading] = useState(!!HARDCODED_URL);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [menuOpen, setMenuOpen] = useState(false);

  const syncTimer = useRef(null);

  useEffect(() => {
    if (!HARDCODED_URL) { setLoading(false); return; }
    fetchAllData(HARDCODED_URL)
      .then(data => {
        if (data.Entries) { setEntriesRaw(data.Entries); setCache(data.Entries); }
        setLoading(false);
      })
      .catch(err => {
        console.error("Fetch error:", err);
        setLoading(false);
      });
  }, []);

  const scheduleSync = useCallback((data) => {
    setCache(data);
    if (!HARDCODED_URL) return;
    setSyncStatus("syncing");
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => {
      syncSheet(HARDCODED_URL, data);
      setTimeout(() => setSyncStatus("idle"), 1200);
    }, 1500);
  }, []);

  const setEntries = u => setEntriesRaw(p => {
    const n = typeof u === "function" ? u(p) : u;
    scheduleSync(n);
    return n;
  });

  const refresh = () => {
    if (!HARDCODED_URL) return;
    setLoading(true);
    fetchAllData(HARDCODED_URL)
      .then(data => {
        if (data.Entries) { setEntriesRaw(data.Entries); setCache(data.Entries); }
        setLoading(false);
      })
      .catch(() => setLoading(false));
  };

  const S = {
    inp:   { padding:"10px 12px", background:"#f8f8fa", border:"1px solid #e5e7eb", borderRadius:8, color:"#1f2937", fontSize:13, fontWeight:500, width:"100%" },
    card:  { background:"#ffffff", border:"1px solid #e5e7eb", borderRadius:16, padding:24 },
    pill:  (color) => ({ fontSize:11, fontWeight:700, padding:"4px 11px", borderRadius:20, background:`${color}15`, color, letterSpacing:0.8, textTransform:"uppercase", whiteSpace:"nowrap", display:"inline-block" }),
    secHd: { fontSize:15, fontWeight:700, color:"#111827", letterSpacing:1.2, textTransform:"uppercase", marginBottom:20 },
  };

  const navItems = [
    { id:"dashboard", label:"Dashboard", icon:"◈" },
    { id:"entries",   label:"Entries",   icon:"◧" },
  ];

  const navTo = (id) => { setView(id); setMenuOpen(false); };

  if (loading && entries.length === 0) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
        <div style={{ width:40, height:40, border:"3px solid #e5e7eb", borderTop:`3px solid ${PRIMARY}`, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
        <div style={{ fontSize:14, color:"#4b5563", fontWeight:500 }}>Loading your data...</div>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  return (
    <div style={{ display:"flex", minHeight:"100vh", fontFamily:"'Sora',sans-serif" }}>

      <button className="hamburger" onClick={()=>setMenuOpen(!menuOpen)} style={{
        position:"fixed", top:12, left:12, zIndex:25,
        background:SIDEBAR_BG, border:`1px solid ${SIDEBAR_BORDER}`, borderRadius:10,
        color:ACCENT_LIGHT, fontSize:20, padding:"8px 13px", cursor:"pointer",
        alignItems:"center", justifyContent:"center"
      }}>
        {menuOpen ? "✕" : "☰"}
      </button>

      <div className={`sidebar-overlay${menuOpen?" open":""}`} onClick={()=>setMenuOpen(false)} />

      <aside className={`sidebar${menuOpen?" open":""}`} style={{ width:225, background:SIDEBAR_BG, borderRight:`1px solid ${SIDEBAR_BORDER}`, display:"flex", flexDirection:"column", position:"fixed", height:"100vh", zIndex:15, top:0, left:0 }}>
        <div style={{ padding:"24px 22px 20px", borderBottom:`1px solid ${SIDEBAR_BORDER}` }}>
          <div style={{ fontSize:11, letterSpacing:3, color:ACCENT_LIGHT, fontWeight:600, textTransform:"uppercase", marginBottom:5 }}>QuickMart</div>
          <div style={{ fontSize:18, fontWeight:700, color:"#fff", letterSpacing:"-0.02em" }}>Finance Hub</div>
        </div>
        <nav style={{ flex:1, padding:"14px 10px", overflowY:"auto" }}>
          {navItems.map(item => (
            <button key={item.id} onClick={()=>navTo(item.id)} style={{
              width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 13px", borderRadius:10,
              background: view===item.id?`${PRIMARY}40`:"transparent",
              color: view===item.id?ACCENT_LIGHT:"#bae6fd",
              border: view===item.id?`1px solid ${PRIMARY}66`:"1px solid transparent",
              fontSize:13, fontWeight:view===item.id?600:400, cursor:"pointer", marginBottom:3,
              transition:"all 0.15s", textAlign:"left"
            }}>
              <span style={{ fontSize:15 }}>{item.icon}</span>{item.label}
            </button>
          ))}
        </nav>

        <div style={{ padding:"8px 10px", borderTop:`1px solid ${SIDEBAR_BORDER}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 13px", marginBottom:6 }}>
            <div style={{ width:7, height:7, borderRadius:"50%", background: syncStatus==="syncing"?"#fbbf24":"#22c55e" }} className={syncStatus==="syncing"?"syncing-dot":""} />
            <span style={{ fontSize:11, color:"#bae6fd" }}>{syncStatus==="syncing"?"Syncing...": HARDCODED_URL ? "Synced" : "Local Only"}</span>
          </div>
          <button onClick={refresh} style={{ width:"100%", padding:"8px", borderRadius:8, background:SIDEBAR_BORDER, border:"1px solid #0e7490", color:"#bae6fd", fontSize:12, cursor:"pointer", marginBottom:6 }}>↻ Refresh Data</button>
          <button onClick={()=>navTo("entries")} style={{ width:"100%", padding:"11px", borderRadius:10, background:PRIMARY, color:"#fff", border:"none", fontWeight:600, fontSize:13, cursor:"pointer" }}>+ Add Entry</button>
        </div>

        <div style={{ padding:"6px 10px 14px", display:"flex", flexDirection:"column", gap:6 }}>
          <button onClick={onLogout} style={{ width:"100%", padding:"7px", borderRadius:8, background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.25)", color:"#fca5a5", fontSize:11, cursor:"pointer" }}>Lock App</button>
        </div>
      </aside>

      <main className="main-content" style={{ marginLeft:225, flex:1, padding:"32px 34px", minWidth:0 }}>
        {view==="dashboard" && <DashboardView entries={entries} S={S} setView={setView}/>}
        {view==="entries" && <EntriesView entries={entries} setEntries={setEntries} S={S}/>}
      </main>
    </div>
  );
}

// ─── shared atoms ────────────────────────────────────────────
function PH({ label, title }) {
  return <div style={{ marginBottom:28 }}><div style={{ fontSize:11,color:PRIMARY,letterSpacing:3,fontWeight:600,textTransform:"uppercase",marginBottom:5 }}>{label}</div><h1 style={{ fontSize:28,fontWeight:700,color:"#111827",margin:0,letterSpacing:"-0.02em",lineHeight:1.2 }}>{title}</h1></div>;
}
function RW({ label, value, color="#6b7280" }) {
  return <div style={{ display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:7 }}><span style={{ fontSize:13,color:"#4b5563",fontWeight:500 }}>{label}</span><span style={{ fontSize:14,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace" }}>{value}</span></div>;
}
function Th({ children }) { return <th style={{ padding:"12px 15px",textAlign:"left",fontSize:11,color:"#4b5563",fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",whiteSpace:"nowrap" }}>{children}</th>; }
function Td({ children, s={} }) { return <td style={{ padding:"11px 15px",fontSize:13,color:"#1f2937",...s }}>{children}</td>; }
function Fld({ label, children }) { return <div><label style={{ fontSize:11,color:"#4b5563",display:"block",marginBottom:6,letterSpacing:0.8,textTransform:"uppercase",fontWeight:600 }}>{label}</label>{children}</div>; }
function Abtn({ color, onClick, children }) { return <button onClick={onClick} style={{ padding:"4px 10px",background:`${color}18`,border:`1px solid ${color}40`,borderRadius:6,color,fontSize:12,cursor:"pointer" }}>{children}</button>; }

// ─── DATE RANGE FILTER COMPONENT ─────────────────────────────
function DateRangeFilter({ filter, setFilter, customFrom, setCustomFrom, customTo, setCustomTo }) {
  const pills = [
    { id:"all", label:"All Time" },
    { id:"today", label:"Today" },
    { id:"week", label:"This Week" },
    { id:"month", label:"This Month" },
    { id:"custom", label:"Custom" },
  ];
  return (
    <div style={{ display:"flex", gap:7, alignItems:"center", flexWrap:"wrap", marginBottom:18 }}>
      {pills.map(p => (
        <button key={p.id} onClick={()=>setFilter(p.id)} style={{
          padding:"7px 15px", borderRadius:20, fontSize:13, fontWeight: filter===p.id ? 600 : 500,
          background: filter===p.id ? PRIMARY : "#f8f8fa",
          color: filter===p.id ? "#fff" : "#6b7280",
          border: filter===p.id ? `1px solid ${PRIMARY}` : "1px solid #e5e7eb",
          cursor:"pointer", transition:"all 0.15s"
        }}>{p.label}</button>
      ))}
      {filter==="custom" && (
        <>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{ padding:"6px 10px", borderRadius:8, border:"1px solid #e5e7eb", fontSize:12, color:"#1f2937" }} />
          <span style={{ fontSize:12, color:"#6b7280" }}>to</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{ padding:"6px 10px", borderRadius:8, border:"1px solid #e5e7eb", fontSize:12, color:"#1f2937" }} />
        </>
      )}
    </div>
  );
}

// ─── DASHBOARD VIEW ──────────────────────────────────────────
function DashboardView({ entries, S, setView }) {
  const [dateFilter, setDateFilter] = useState("all");
  const [customFrom, setCustomFrom] = useState(today());
  const [customTo, setCustomTo] = useState(today());

  const filtered = useMemo(() => filterByDate(entries, dateFilter, customFrom, customTo), [entries, dateFilter, customFrom, customTo]);

  const income = filtered.filter(e => e.type === "income");
  const expenses = filtered.filter(e => e.type === "expense");
  const totalIncome = income.reduce((s, e) => s + (+e.amount || 0), 0);
  const totalExpenses = expenses.reduce((s, e) => s + (+e.amount || 0), 0);
  const netProfit = totalIncome - totalExpenses;
  const margin = totalIncome > 0 ? ((netProfit / totalIncome) * 100).toFixed(1) : 0;

  const salesByCategory = useMemo(() => {
    const map = {};
    INCOME_CATS.forEach(c => { map[c] = 0; });
    income.forEach(e => { if (e.category) map[e.category] = (map[e.category] || 0) + (+e.amount || 0); });
    return map;
  }, [income]);

  const expByCategory = useMemo(() => {
    const map = {};
    EXPENSE_CATS.forEach(c => { map[c] = 0; });
    expenses.forEach(e => { if (e.category) map[e.category] = (map[e.category] || 0) + (+e.amount || 0); });
    return map;
  }, [expenses]);

  const expByPerson = useMemo(() => {
    const map = {};
    PEOPLE.forEach(p => { map[p] = 0; });
    expenses.forEach(e => { if (e.paidBy) map[e.paidBy] = (map[e.paidBy] || 0) + (+e.amount || 0); });
    return map;
  }, [expenses]);

  const reimbursements = filtered.filter(e => e.type === "reimbursement");
  const reimbByPerson = useMemo(() => {
    const map = {};
    PEOPLE.forEach(p => { map[p] = 0; });
    reimbursements.forEach(e => { if (e.paidBy) map[e.paidBy] = (map[e.paidBy] || 0) + (+e.amount || 0); });
    return map;
  }, [reimbursements]);

  const pendingEntries = useMemo(() => filtered.filter(e => e.status === "pending"), [filtered]);
  const totalPending = pendingEntries.reduce((s, e) => s + (+e.amount || 0), 0);

  const recent = useMemo(() => [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 7), [filtered]);

  const salesColors = { "Counter Sales":"#3b82f6", "Wholesale":"#8b5cf6", "Online Orders":"#06b6d4", "Home Delivery":"#f97316", "Festival Sales":"#ec4899", "Misc Income":"#6b7280" };

  return (
    <div className="fade-in">
      <PH label="Overview" title="Financial Dashboard" />
      <DateRangeFilter filter={dateFilter} setFilter={setDateFilter} customFrom={customFrom} setCustomFrom={setCustomFrom} customTo={customTo} setCustomTo={setCustomTo} />

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:11, marginBottom:22 }}>
        {[
          { label:"Total Income", value:fmt(totalIncome), color:"#22c55e", icon:"↑" },
          { label:"Total Expenses", value:fmt(totalExpenses), color:"#f87171", icon:"↓" },
          { label:"Net Profit", value:fmt(netProfit), color:netProfit>=0?"#22c55e":"#f87171", icon:"◈" },
          { label:"Profit Margin", value:`${margin}%`, color:PRIMARY, icon:"%" },
        ].map(c => (
          <div key={c.label} style={{ background:`${c.color}0a`, border:`1px solid ${c.color}30`, borderRadius:14, padding:"18px 20px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:12, color:"#4b5563", fontWeight:500, marginBottom:10 }}>{c.label}</div>
              <span style={{ color:c.color, fontSize:16, opacity:0.7 }}>{c.icon}</span>
            </div>
            <div style={{ fontSize:22, fontWeight:700, color:c.color, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"-0.02em" }}>{c.value}</div>
          </div>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:18 }}>
        <div style={S.card}>
          <div style={S.secHd}>SALES BREAKDOWN</div>
          {INCOME_CATS.map(cat => {
            const amt = salesByCategory[cat] || 0;
            if (amt === 0) return null;
            const color = salesColors[cat] || "#6b7280";
            const pct = totalIncome > 0 ? ((amt / totalIncome) * 100).toFixed(1) : 0;
            return (
              <div key={cat} style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 }}>
                  <span style={{ fontSize:13, color:"#4b5563", fontWeight:500 }}>{cat}</span>
                  <span style={{ fontSize:13, fontWeight:700, color, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(amt)}</span>
                </div>
                <div style={{ height:6, background:"#f3f4f6", borderRadius:3 }}>
                  <div style={{ height:6, background:color, borderRadius:3, width:`${pct}%`, transition:"width 0.3s" }} />
                </div>
              </div>
            );
          })}
          {totalIncome === 0 && <div style={{ textAlign:"center", padding:20, color:"#6b7280", fontSize:13 }}>No income recorded yet.</div>}
        </div>

        <div style={S.card}>
          <div style={S.secHd}>EXPENSE BREAKDOWN</div>
          {EXPENSE_CATS.map(cat => {
            const amt = expByCategory[cat] || 0;
            if (amt === 0) return null;
            const pct = totalExpenses > 0 ? ((amt / totalExpenses) * 100).toFixed(1) : 0;
            return (
              <div key={cat} style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 }}>
                  <span style={{ fontSize:13, color:"#4b5563", fontWeight:500 }}>{cat}</span>
                  <span style={{ fontSize:13, fontWeight:700, color:"#f87171", fontFamily:"'JetBrains Mono',monospace" }}>{fmt(amt)}</span>
                </div>
                <div style={{ height:6, background:"#f3f4f6", borderRadius:3 }}>
                  <div style={{ height:6, background:"#f87171", borderRadius:3, width:`${pct}%`, transition:"width 0.3s" }} />
                </div>
              </div>
            );
          })}
          {totalExpenses === 0 && <div style={{ textAlign:"center", padding:20, color:"#6b7280", fontSize:13 }}>No expenses recorded yet.</div>}
        </div>
      </div>

      {(totalExpenses > 0 || totalPending > 0) && (
        <div style={{ display:"grid", gridTemplateColumns: totalExpenses > 0 && totalPending > 0 ? "1fr auto" : "1fr", gap:14, marginBottom:18 }}>
          {totalExpenses > 0 && (
            <div style={S.card}>
              <div style={S.secHd}>EXPENSES BY PERSON</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:12 }}>
                {PEOPLE.map(p => {
                  const paid = expByPerson[p] || 0;
                  const reimb = reimbByPerson[p] || 0;
                  const owed = paid - reimb;
                  return (
                    <div key={p} style={{ background:"#f8f8fa", borderRadius:12, padding:16, border:"1px solid #e5e7eb" }}>
                      <div style={{ fontSize:16, fontWeight:700, color:"#111827", marginBottom:13, letterSpacing:"-0.01em" }}>{p}</div>
                      <RW label="Expenses Paid" value={fmt(paid)} color="#f97316" />
                      {reimb > 0 && <RW label="Reimbursed" value={fmt(reimb)} color="#10b981" />}
                      {reimb > 0 && <>
                        <div style={{ margin:"8px 0", borderTop:"1px solid #e5e7eb" }} />
                        <RW label="Balance Owed" value={fmt(owed)} color={owed > 0 ? "#f87171" : "#22c55e"} />
                      </>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {totalPending > 0 && (
            <div style={{ ...S.card, borderLeft:`4px solid #f59e0b`, minWidth:160, display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center" }}>
              <div style={{ fontSize:12, color:"#4b5563", fontWeight:600, textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Pending</div>
              <div style={{ fontSize:24, fontWeight:700, color:"#f59e0b", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"-0.02em" }}>{fmt(totalPending)}</div>
              <div style={{ fontSize:12, color:"#6b7280", marginTop:6 }}>{pendingEntries.length} payment{pendingEntries.length !== 1 ? "s" : ""}</div>
            </div>
          )}
        </div>
      )}

      <div style={S.card}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={S.secHd}>RECENT ENTRIES</div>
          <button onClick={()=>setView("entries")} style={{ fontSize:13,color:PRIMARY,background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:"4px 0" }}>View All →</button>
        </div>
        {recent.length === 0 && <div style={{ textAlign:"center", padding:30, color:"#6b7280", fontSize:13 }}>No entries yet. Click "+ Add Entry" to start.</div>}
        {recent.map(e => {
          const isIncome = e.type === "income";
          const isInvest = e.type === "investment";
          const isWithdraw = e.type === "withdrawal";
          const isReimb = e.type === "reimbursement";
          const iconBg = isIncome ? "rgba(34,197,94,0.12)" : isInvest ? "rgba(59,130,246,0.12)" : isWithdraw ? "rgba(245,158,11,0.12)" : isReimb ? "rgba(16,185,129,0.12)" : "rgba(248,113,113,0.12)";
          const icon = isIncome ? "↑" : isInvest ? "◈" : isWithdraw ? "⇤" : isReimb ? "↩" : "↓";
          const amtColor = isIncome ? "#22c55e" : isInvest ? "#3b82f6" : isWithdraw ? "#f59e0b" : isReimb ? "#10b981" : "#f87171";
          return (
            <div key={e.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #e5e7eb" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:33, height:33, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", background:iconBg, fontSize:14 }}>{icon}</div>
                <div>
                  <div style={{ fontSize:14, fontWeight:600, color:"#111827" }}>{e.category}{e.paidBy ? ` · ${e.paidBy}` : ""}</div>
                  <div style={{ fontSize:12, color:"#6b7280", marginTop:2 }}>{e.note || "—"} · {e.date}</div>
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:15, fontWeight:700, color:amtColor, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"-0.02em" }}>
                  {isIncome?"+":(isInvest?"":isWithdraw?"−":isReimb?"−":"−")}{fmt(+e.amount)}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ENTRIES VIEW ────────────────────────────────────────────
function EntriesView({ entries, setEntries, S }) {
  const emptyForm = { date:today(), type:"income", category:INCOME_CATS[0], amount:"", paidBy:"", note:"", status:"paid" };
  const [form, setForm] = useState(emptyForm);
  const [editId, setEditId] = useState(null);
  const [show, setShow] = useState(false);
  const [fType, setFType] = useState("all");
  const [fCat, setFCat] = useState("all");
  const [dateFilter, setDateFilter] = useState("all");
  const [customFrom, setCustomFrom] = useState(today());
  const [customTo, setCustomTo] = useState(today());

  const chg = (k, v) => {
    const u = { ...form, [k]: v };
    if (k === "type") {
      if (v === "investment") {
        u.category = "Capital";
        u.paidBy = u.paidBy || PEOPLE[0];
      } else if (v === "withdrawal") {
        u.category = "Owner Draw";
        u.paidBy = u.paidBy || PEOPLE[0];
      } else if (v === "reimbursement") {
        u.category = "Reimbursement";
        u.paidBy = u.paidBy || PEOPLE[0];
      } else if (v === "income") {
        u.category = INCOME_CATS[0];
        u.paidBy = "";
      } else {
        u.category = EXPENSE_CATS[0];
        u.paidBy = u.paidBy || PEOPLE[0];
      }
    }
    setForm(u);
  };

  const isInvestment = form.type === "investment";
  const isWithdrawal = form.type === "withdrawal";
  const isReimbursement = form.type === "reimbursement";
  const showPaidBy = form.type === "expense" || isInvestment || isWithdrawal || isReimbursement;
  const showCategory = !isInvestment && !isWithdrawal && !isReimbursement;

  const submit = () => {
    if (!form.amount || +form.amount <= 0) return;
    const entry = {
      date: form.date,
      dateTo: "",
      type: form.type,
      category: isInvestment ? "Capital" : isWithdrawal ? "Owner Draw" : isReimbursement ? "Reimbursement" : form.category,
      amount: +form.amount,
      commission: 0,
      gst: 0,
      deliveryCharge: 0,
      paidBy: showPaidBy ? (form.paidBy || PEOPLE[0]) : "",
      note: form.note,
      status: form.status || "paid",
    };
    entry.netAmount = +form.amount;

    if (editId) {
      setEntries(p => p.map(e => e.id === editId ? { ...entry, id: editId } : e));
      setEditId(null);
    } else {
      setEntries(p => [...p, { ...entry, id: Date.now() }]);
    }
    setForm(emptyForm); setShow(false);
  };

  const edit = (e) => {
    setForm({
      date: e.date, type: e.type, category: e.category,
      amount: e.amount,
      paidBy: e.paidBy || "", note: e.note || "", status: e.status || "paid"
    });
    setEditId(e.id); setShow(true);
  };

  const del = (id) => { if (window.confirm("Delete this entry?")) setEntries(p => p.filter(e => e.id !== id)); };

  const cats = form.type === "income" ? INCOME_CATS : form.type === "expense" ? EXPENSE_CATS : form.type === "investment" ? ["Capital"] : form.type === "withdrawal" ? ["Owner Draw"] : ["Reimbursement"];

  const filtered = useMemo(() => {
    let list = entries;
    list = filterByDate(list, dateFilter, customFrom, customTo);
    if (fType !== "all") list = list.filter(e => e.type === fType);
    if (fCat !== "all") list = list.filter(e => e.category === fCat);
    return list.sort((a, b) => new Date(b.date) - new Date(a.date) || (b.id || 0) - (a.id || 0));
  }, [entries, dateFilter, customFrom, customTo, fType, fCat]);

  const fIncomeEntries = filtered.filter(e => e.type === "income");
  const fNetIncome = fIncomeEntries.reduce((s, e) => s + (+e.amount || 0), 0);
  const fExpense = filtered.filter(e => e.type === "expense").reduce((s, e) => s + (+e.amount || 0), 0);
  const fInvestment = filtered.filter(e => e.type === "investment").reduce((s, e) => s + (+e.amount || 0), 0);
  const fWithdrawal = filtered.filter(e => e.type === "withdrawal").reduce((s, e) => s + (+e.amount || 0), 0);

  return (
    <div className="fade-in">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:12, flexWrap:"wrap", gap:12 }}>
        <PH label="Records" title="All Entries" />
        <button onClick={()=>{setShow(true);setEditId(null);setForm(emptyForm);}} style={{ padding:"10px 17px",background:PRIMARY,border:"none",borderRadius:8,color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer" }}>+ Add Entry</button>
      </div>

      <DateRangeFilter filter={dateFilter} setFilter={setDateFilter} customFrom={customFrom} setCustomFrom={setCustomFrom} customTo={customTo} setCustomTo={setCustomTo} />

      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:16 }}>
        <select value={fType} onChange={e=>setFType(e.target.value)} style={{ ...S.inp,width:"auto" }}>
          <option value="all">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
          <option value="investment">Investment</option>
          <option value="withdrawal">Withdrawal</option>
          <option value="reimbursement">Reimbursement</option>
        </select>
        <select value={fCat} onChange={e=>setFCat(e.target.value)} style={{ ...S.inp,width:"auto" }}>
          <option value="all">All Categories</option>
          <optgroup label="Income">{INCOME_CATS.map(c=><option key={c}>{c}</option>)}</optgroup>
          <optgroup label="Expense">{EXPENSE_CATS.map(c=><option key={c}>{c}</option>)}</optgroup>
        </select>
      </div>

      {show && (
        <div style={{ ...S.card, marginBottom:18 }}>
          <div style={{ fontSize:13, fontWeight:700, color:PRIMARY, marginBottom:16, letterSpacing:1.2, textTransform:"uppercase" }}>{editId ? "EDIT ENTRY" : "NEW ENTRY"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))", gap:11, marginBottom:12 }}>
            <Fld label="Date"><input type="date" value={form.date} onChange={e=>chg("date",e.target.value)} style={S.inp}/></Fld>
            <Fld label="Type">
              <select value={form.type} onChange={e=>chg("type",e.target.value)} style={S.inp}>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="investment">Investment</option>
                <option value="withdrawal">Withdrawal</option>
                <option value="reimbursement">Reimbursement</option>
              </select>
            </Fld>
            {showCategory && (
              <Fld label="Category">
                <select value={form.category} onChange={e=>chg("category",e.target.value)} style={S.inp}>
                  {cats.map(c=><option key={c}>{c}</option>)}
                </select>
              </Fld>
            )}
            <Fld label="Amount">
              <input type="number" placeholder="0" value={form.amount} onChange={e=>chg("amount",e.target.value)} style={{ ...S.inp,fontFamily:"'JetBrains Mono',monospace" }}/>
            </Fld>
            {showPaidBy && (
              <Fld label={isReimbursement ? "Reimbursed To" : "Paid By"}>
                <select value={form.paidBy} onChange={e=>chg("paidBy",e.target.value)} style={S.inp}>
                  {PEOPLE.map(p=><option key={p}>{p}</option>)}
                </select>
              </Fld>
            )}
            <Fld label="Payment Status">
              <select value={form.status} onChange={e=>chg("status",e.target.value)} style={{ ...S.inp, color: form.status === "pending" ? "#f59e0b" : "#22c55e", fontWeight:600 }}>
                <option value="paid">Paid</option>
                <option value="pending">Pending</option>
              </select>
            </Fld>
            <Fld label="Note"><input type="text" placeholder="Optional…" value={form.note} onChange={e=>chg("note",e.target.value)} style={S.inp}/></Fld>
            <Fld label=" ">
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={submit} style={{ flex:1,padding:"10px",background:PRIMARY,border:"none",borderRadius:8,color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer" }}>{editId?"Save":"Add"}</button>
                <button onClick={()=>{setShow(false);setEditId(null);}} style={{ flex:1,padding:"10px",background:"#e5e7eb",border:"none",borderRadius:8,color:"#6b7280",fontSize:13,cursor:"pointer" }}>Cancel</button>
              </div>
            </Fld>
          </div>
        </div>
      )}

      <div style={{ ...S.card, padding:0, overflow:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", minWidth:640 }}>
          <thead>
            <tr style={{ borderBottom:"1px solid #e5e7eb" }}>
              <Th>Date</Th><Th>Type</Th><Th>Category</Th><Th>Paid By</Th><Th>Amount</Th><Th>Status</Th><Th>Note</Th><Th>Actions</Th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((e, i) => {
              const isIncome = e.type === "income";
              const isInvest = e.type === "investment";
              const isWithdraw = e.type === "withdrawal";
              const isReimb = e.type === "reimbursement";
              const pillColor = isIncome ? "#22c55e" : isInvest ? "#3b82f6" : isWithdraw ? "#f59e0b" : isReimb ? "#10b981" : "#f87171";
              return (
                <tr key={e.id} style={{ borderBottom:"1px solid #e5e7eb", background:i%2?"rgba(0,0,0,0.02)":"transparent" }}>
                  <Td s={{ color:"#6b7280", fontFamily:"'JetBrains Mono',monospace", whiteSpace:"nowrap" }}>{e.date}</Td>
                  <Td><span style={S.pill(pillColor)}>{e.type}</span></Td>
                  <Td s={{ color:"#374151" }}>{e.category}</Td>
                  <Td s={{ color:"#6b7280", fontSize:12 }}>{e.paidBy || "—"}</Td>
                  <Td s={{ fontWeight:700, color:isIncome?"#22c55e":isInvest?"#3b82f6":isWithdraw?"#f59e0b":isReimb?"#10b981":"#f87171", fontFamily:"'JetBrains Mono',monospace", whiteSpace:"nowrap" }}>
                    {isIncome?"+":(isInvest?"":isWithdraw?"−":isReimb?"−":"−")}{fmt(+e.amount)}
                  </Td>
                  <Td>{e.status === "pending" ? <span style={S.pill("#f59e0b")}>pending</span> : <span style={S.pill("#22c55e")}>paid</span>}</Td>
                  <Td s={{ color:"#6b7280", maxWidth:150, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.note || "—"}</Td>
                  <Td>
                    <div style={{ display:"flex", gap:7 }}>
                      {e.status === "pending" && <Abtn color="#22c55e" onClick={()=>setEntries(p=>p.map(x=>x.id===e.id?{...x,status:"paid"}:x))}>Paid</Abtn>}
                      <Abtn color={PRIMARY} onClick={()=>edit(e)}>Edit</Abtn>
                      <Abtn color="#f87171" onClick={()=>del(e.id)}>Del</Abtn>
                    </div>
                  </Td>
                </tr>
              );
            })}
            {filtered.length===0 && <tr><td colSpan={8} style={{ padding:34,textAlign:"center",color:"#6b7280",fontSize:13 }}>No entries found</td></tr>}
          </tbody>
        </table>
        <div style={{ padding:"13px 15px", borderTop:"1px solid #e5e7eb", fontSize:13, color:"#4b5563", fontWeight:500 }}>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"6px 16px", alignItems:"baseline" }}>
            <span>{filtered.length} entries</span>
            <span>Income: <span style={{ color:"#22c55e", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(fNetIncome)}</span></span>
            <span>Expenses: <span style={{ color:"#f87171", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(fExpense)}</span></span>
            {fInvestment > 0 && <span>Invested: <span style={{ color:"#3b82f6", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(fInvestment)}</span></span>}
            {fWithdrawal > 0 && <span>Withdrawn: <span style={{ color:"#f59e0b", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(fWithdrawal)}</span></span>}
            <span>Net: <span style={{ color:(fNetIncome-fExpense)>=0?"#22c55e":"#f87171", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(fNetIncome-fExpense)}</span></span>
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
